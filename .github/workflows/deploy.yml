name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write # push the built site to the gh-pages branch

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # Kenney models are not committed (see assets/ASSETS.md); fetch them at
      # build time. Any failure here is non-fatal — the game falls back to
      # procedural karts.
      - name: Fetch CC0 kart models (best effort)
        continue-on-error: true
        run: |
          npm run assets:download
          node -r ts-node/register/transpile-only scripts/optimize-assets.ts --filter "kart-oo|race-future|race\.glb|raceCarWhite"
          npm run assets:build

      - run: npm run build

      - name: Publish dist/ to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
